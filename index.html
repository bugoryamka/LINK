<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --fg: #111111;
      --muted: #5f5f5f;
      --accent: #e10600;
      --line: #cfcfcf;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--fg);
      font-family: Helvetica, Arial, sans-serif;
    }

    .page {
      width: min(92vw, 760px);
      padding: 40px 28px 48px;
      border-top: 8px solid var(--accent);
    }

    .kicker {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 22px;
      font-size: clamp(34px, 6vw, 68px);
      line-height: 0.95;
      text-transform: uppercase;
      font-weight: 700;
    }

    .desc {
      max-width: 680px;
      font-size: 18px;
      line-height: 1.45;
      margin-bottom: 28px;
    }

    .desc p {
      margin: 0 0 14px;
    }

    .task {
      padding-left: 14px;
      border-left: 3px solid var(--fg);
      margin: 18px 0;
      font-weight: 500;
    }

    .form {
      display: grid;
      gap: 14px;
      margin-top: 24px;
      max-width: 420px;
    }

    input {
      width: 100%;
      border: none;
      border-bottom: 2px solid var(--fg);
      background: transparent;
      padding: 14px 0;
      font-size: 22px;
      color: var(--fg);
      outline: none;
    }

    input::placeholder {
      color: #9a9a9a;
    }

    button,
    .link-btn {
      width: fit-content;
      border: 1px solid var(--fg);
      background: transparent;
      color: var(--fg);
      padding: 14px 18px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      cursor: pointer;
      text-decoration: none;
      transition: 0.2s ease;
    }

    button:hover,
    .link-btn:hover {
      background: var(--fg);
      color: var(--bg);
    }

    .message {
      min-height: 20px;
      font-size: 13px;
      letter-spacing: 0.03em;
    }

    .error {
      color: var(--accent);
    }

    .success {
      color: var(--fg);
    }

    #result {
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="kicker">Verification</div>
    <h1>Get<br>Link</h1>

    <section class="desc">
      <p><strong>Чтобы получить ссылку, решите задачу:</strong></p>
      <p class="task">
        Число увеличили на 20%, а потом уменьшили на 25%. В итоге получилось 96.
        Найти первоначальное число.
      </p>
      <p>
        Ответ введите в поле ниже целым числом, без остатка
        (пример 34, 20, 2, 14...)
      </p>
    </section>

    <div class="form">
      <input id="answerInput" type="text" inputmode="numeric" placeholder="Введите ответ" />
      <button id="submitBtn">Проверить</button>
      <div id="message" class="message"></div>
      <div id="result"></div>
    </div>
  </main>

  <script>
    const CORRECT_ANSWER = "80";
    const TARGET_LINK = "https://example.com";

    const input = document.getElementById("answerInput");
    const button = document.getElementById("submitBtn");
    const message = document.getElementById("message");
    const result = document.getElementById("result");

    function checkAnswer() {
      const value = input.value.trim();
      result.innerHTML = "";

      if (!value) {
        message.textContent = "Введите ответ.";
        message.className = "message error";
        return;
      }

      if (!/^\d+$/.test(value)) {
        message.textContent = "Введите целое число без лишних символов.";
        message.className = "message error";
        return;
      }

      if (value === CORRECT_ANSWER) {
        message.textContent = "Верно. Ссылка доступна ниже.";
        message.className = "message success";

        const link = document.createElement("a");
        link.href = TARGET_LINK;
        link.textContent = "Перейти по ссылке";
        link.className = "link-btn";
        link.target = "_blank";
        link.rel = "noopener noreferrer";

        result.appendChild(link);
      } else {
        message.textContent = "Неверный ответ.";
        message.className = "message error";
      }
    }

    button.addEventListener("click", checkAnswer);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") checkAnswer();
    });
  </script>
</body>
</html>
