<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Созвон</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #17171a;
            --surface: #1c1c20;
            --surface-hover: #222226;
            --border: #2c2c30;
            --border-hover: #3a3a40;
            --text: #e0e0e0;
            --text2: #8e8e93;
            --text3: #636366;
            --accent: #5856d6;
            --accent-hover: #6e6ce0;
            --green: #34c759;
            --green-bg: rgba(52, 199, 89, 0.08);
            --green-border: rgba(52, 199, 89, 0.2);
            --red: #ff453a;
            --red-bg: rgba(255, 69, 58, 0.08);
            --red-border: rgba(255, 69, 58, 0.2);
            --input-bg: #141416;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            --mono: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
            --radius: 4px;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
            position: relative;
        }

        /* ── DVD Bouncing Video ── */
        #dvd {
            position: fixed;
            z-index: 0;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.6), 0 0 2px rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            pointer-events: none;
        }

        #dvd video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ── Container ── */
        .container {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
        }

        /* ── Top bar ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }

        .top-bar__left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            font-size: 18px;
            letter-spacing: -0.03em;
            color: var(--text2);
            user-select: none;
        }

        .logo b {
            color: var(--text);
            font-weight: 600;
        }

        .top-bar__dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--text3);
        }

        .top-bar__label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text2);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 24px;
            transition: border-color 0.2s;
            backdrop-filter: blur(8px);
            background: rgba(28, 28, 32, 0.92);
        }

        .card:hover {
            border-color: var(--border-hover);
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 16px;
        }

        .task-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .task-body {
            font-size: 13px;
            color: var(--text2);
            line-height: 1.65;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 16px;
            font-family: var(--mono);
            letter-spacing: -0.01em;
            white-space: pre-line;
        }

        .task-hint {
            font-size: 12px;
            color: var(--text3);
            line-height: 1.55;
            margin-bottom: 20px;
        }

        .task-hint code {
            font-family: var(--mono);
            font-size: 11px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 2px 6px;
            color: var(--text2);
        }

        .divider {
            height: 1px;
            background: var(--border);
            border: none;
            margin: 20px 0;
        }

        .form-row {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }

        .input {
            flex: 1;
            font-family: var(--mono);
            font-size: 14px;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--input-bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input::placeholder { color: var(--text3); }

        .input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(88, 86, 214, 0.15);
        }

        .btn {
            font-family: var(--font);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.03em;
            padding: 9px 20px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
        }

        .btn:hover {
            background: var(--surface-hover);
            border-color: var(--border-hover);
            color: #fff;
        }

        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .msg {
            margin-top: 16px;
            padding: 12px 14px;
            border-radius: var(--radius);
            font-size: 13px;
            line-height: 1.5;
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .msg--err {
            background: var(--red-bg);
            border: 1px solid var(--red-border);
            color: var(--red);
        }

        .msg--ok {
            background: var(--green-bg);
            border: 1px solid var(--green-border);
            color: var(--green);
        }

        .msg a {
            color: var(--green);
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.15s;
            word-break: break-all;
        }

        .msg a:hover { border-bottom-color: var(--green); }

        .arrow {
            display: inline-block;
            margin-left: 4px;
            transition: transform 0.15s;
            font-size: 12px;
        }

        .msg a:hover .arrow { transform: translateX(3px); }

        .footer {
            margin-top: 16px;
            text-align: center;
            font-size: 11px;
            color: var(--text3);
            letter-spacing: 0.02em;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .shake { animation: shake 0.4s ease; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%  { transform: translateX(-5px); }
            40%  { transform: translateX(5px); }
            60%  { transform: translateX(-3px); }
            80%  { transform: translateX(3px); }
        }

        @media (max-width: 560px) {
            body { padding: 16px; align-items: flex-start; padding-top: 40px; }
            .card { padding: 22px 18px; }
            .form-row { flex-direction: column; }
            .btn { text-align: center; padding: 11px 20px; }
            .task-body { font-size: 12px; padding: 14px; }
        }

        @media (max-width: 360px) {
            .card { padding: 18px 14px; }
            .task-title { font-size: 13px; }
        }
    </style>
</head>
<body>

<!-- DVD Bouncing Video -->
<div id="dvd">
    <video src="video.mp4" autoplay muted loop playsinline></video>
</div>

<!-- Main Content -->
<div class="container">

    <div class="top-bar">
        <div class="top-bar__left">
            <span class="logo"><b>✶✶</b></span>
            <div class="top-bar__dot"></div>
            <span class="top-bar__label">Задача</span>
        </div>
    </div>

    <div class="card">

        <div class="section-label">Условие</div>

        <p class="task-title">
            Чтобы получить ссылку, решите задачу:
        </p>

        <div class="task-body">Число увеличили на 20%,
а потом уменьшили на 25%.
В итоге получилось 96.

Найти первоначальное число.</div>

        <p class="task-hint">
            Ответ введите в поле ниже целым числом, без&nbsp;остатка
            (пример: <code>34</code> <code>20</code> <code>2</code> <code>14</code>)
        </p>

        <hr class="divider">

        <div class="section-label">Ответ</div>

        <form id="f" autocomplete="off">
            <div class="form-row">
                <input type="text" id="pw" class="input" placeholder="Введите число…" inputmode="numeric" autofocus required>
                <button type="submit" class="btn" id="btn">Проверить</button>
            </div>
        </form>

        <div id="msg" class="msg"></div>

    </div>

    <div class="footer">Не хочешь срать - не мучай жопу</div>

</div>

<script>
(function() {

    /* ══════════════════════════════════
       DVD BOUNCING VIDEO
    ══════════════════════════════════ */

    const dvd = document.getElementById('dvd');

    function calcSize() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const boxW = Math.round(Math.min(w, h) / 1.5);
        const boxH = Math.round(boxW * 9 / 16);
        return { boxW, boxH, screenW: w, screenH: h };
    }

    let { boxW, boxH, screenW, screenH } = calcSize();

    dvd.style.width  = boxW + 'px';
    dvd.style.height = boxH + 'px';

    let x = Math.random() * (screenW - boxW);
    let y = Math.random() * (screenH - boxH);

    /* Скорость: пикселей за кадр */
    let baseSpeed = Math.max(1.2, Math.min(screenW, screenH) / 600);
    let vx = baseSpeed * (Math.random() > 0.5 ? 1 : -1);
    let vy = baseSpeed * (Math.random() > 0.5 ? 1 : -1);

    /* Цвета при отскоке */
    const hues = [0, 30, 60, 120, 180, 210, 270, 300, 330];
    let hueIndex = 0;

    function setGlow() {
        const hue = hues[hueIndex % hues.length];
        dvd.style.boxShadow =
            '0 0 30px hsla(' + hue + ',80%,55%,0.35), ' +
            '0 0 2px hsla(' + hue + ',80%,70%,0.15)';
        dvd.style.borderColor = 'hsla(' + hue + ',60%,50%,0.25)';
        hueIndex++;
    }

    setGlow();

    function animate() {
        x += vx;
        y += vy;

        let bounced = false;

        if (x <= 0) {
            x = 0;
            vx = Math.abs(vx);
            bounced = true;
        } else if (x + boxW >= screenW) {
            x = screenW - boxW;
            vx = -Math.abs(vx);
            bounced = true;
        }

        if (y <= 0) {
            y = 0;
            vy = Math.abs(vy);
            bounced = true;
        } else if (y + boxH >= screenH) {
            y = screenH - boxH;
            vy = -Math.abs(vy);
            bounced = true;
        }

        if (bounced) setGlow();

        dvd.style.transform = 'translate(' + x + 'px,' + y + 'px)';

        requestAnimationFrame(animate);
    }

    dvd.style.position = 'fixed';
    dvd.style.left = '0';
    dvd.style.top  = '0';
    dvd.style.willChange = 'transform';

    requestAnimationFrame(animate);

    /* Ресайз */
    window.addEventListener('resize', function() {
        const s = calcSize();
        screenW = s.screenW;
        screenH = s.screenH;
        boxW = s.boxW;
        boxH = s.boxH;
        dvd.style.width  = boxW + 'px';
        dvd.style.height = boxH + 'px';

        if (x + boxW > screenW) x = screenW - boxW;
        if (y + boxH > screenH) y = screenH - boxH;
        if (x < 0) x = 0;
        if (y < 0) y = 0;
    });


    /* ══════════════════════════════════
       PASSWORD CHECK
    ══════════════════════════════════ */

    const form  = document.getElementById('f');
    const input = document.getElementById('pw');
    const btn   = document.getElementById('btn');
    const msg   = document.getElementById('msg');

    let PASSWORD = null;
    let LINK = null;

    async function loadFiles() {
        try {
            const [pwRes, linkRes] = await Promise.all([
                fetch('pw.txt'),
                fetch('link.txt')
            ]);
            if (pwRes.ok)   PASSWORD = (await pwRes.text()).trim();
            if (linkRes.ok) LINK     = (await linkRes.text()).trim();
        } catch (e) {
            console.error('Не удалось загрузить файлы:', e);
        }
    }

    loadFiles();

    function esc(s) {
        const d = document.createElement('div');
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        const v = input.value.trim();
        if (!v) { input.focus(); return; }

        msg.style.display = 'none';

        if (PASSWORD === null || LINK === null) {
            msg.className = 'msg msg--err';
            msg.textContent = 'Файлы ещё загружаются, подождите секунду…';
            msg.style.display = 'block';
            return;
        }

        if (v === PASSWORD) {
            msg.className = 'msg msg--ok';
            msg.innerHTML =
                '✓ Верно! Вот ваша ссылка:<br><br>' +
                '<a href="' + esc(LINK) + '" target="_blank" rel="noopener">' +
                esc(LINK) +
                ' <span class="arrow">→</span></a>';
            msg.style.display = 'block';
            input.disabled = true;
            btn.disabled = true;
            btn.textContent = 'Готово';
        } else {
            msg.className = 'msg msg--err';
            msg.textContent = 'Неверный ответ. Попробуйте ещё раз.';
            msg.style.display = 'block';
            input.classList.add('shake');
            setTimeout(function() { input.classList.remove('shake'); }, 400);
            input.select();
        }
    });

})();
</script>

</body>
</html>
