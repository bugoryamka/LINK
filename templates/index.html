<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Получить ссылку</title>
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #ffffff;
            --color-text: #333333;
            --color-text-secondary: #6d6d6d;
            --color-border: #e8e8e8;
            --color-border-hover: #c4c4c4;
            --color-accent: #17ac10;
            --color-accent-hover: #128a0c;
            --color-error: #e84545;
            --color-input-bg: #f9f9f9;
            --color-card-bg: #ffffff;
            --font-stack: -apple-system, BlinkMacSystemFont, "Helvetica Neue",
                          Helvetica, Arial, sans-serif;
            --font-mono: "SFMono-Regular", Consolas, "Liberation Mono",
                         Menlo, Courier, monospace;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.55;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* ===== LAYOUT ===== */
        .container {
            width: 100%;
            max-width: 520px;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 16px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--color-border);
            user-select: none;
        }

        .top-bar__icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .top-bar__icon svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .top-bar__title {
            font-size: 0.8125rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: var(--color-text-secondary);
        }

        /* ===== CARD ===== */
        .card {
            background: var(--color-card-bg);
            border: 1px solid var(--color-border);
            border-radius: 6px;
            padding: 32px 28px;
            transition: border-color 0.2s ease;
        }

        .card:hover {
            border-color: var(--color-border-hover);
        }

        /* ===== TASK SECTION ===== */
        .task-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--color-accent);
            margin-bottom: 12px;
        }

        .task-description {
            font-size: 0.9375rem;
            color: var(--color-text);
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .task-math {
            font-family: var(--font-mono);
            font-size: 0.875rem;
            background: var(--color-input-bg);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            padding: 14px 16px;
            margin: 16px 0;
            line-height: 1.65;
            color: var(--color-text);
        }

        .task-hint {
            font-size: 0.8125rem;
            color: var(--color-text-secondary);
            line-height: 1.55;
            margin-bottom: 24px;
        }

        .task-hint em {
            font-style: normal;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            background: var(--color-input-bg);
            border: 1px solid var(--color-border);
            border-radius: 3px;
            padding: 1px 5px;
        }

        /* ===== DIVIDER ===== */
        .divider {
            height: 1px;
            background: var(--color-border);
            border: none;
            margin: 24px 0;
        }

        /* ===== FORM ===== */
        .form-group {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        .input-field {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 0.9375rem;
            padding: 10px 14px;
            border: 1px solid var(--color-border);
            border-radius: 4px;
            background: var(--color-input-bg);
            color: var(--color-text);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input-field::placeholder {
            color: #b0b0b0;
        }

        .input-field:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 2px rgba(23, 172, 16, 0.12);
            background: #fff;
        }

        .btn {
            font-family: var(--font-stack);
            font-size: 0.8125rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            padding: 10px 22px;
            border: 1px solid var(--color-accent);
            border-radius: 4px;
            background: var(--color-accent);
            color: #ffffff;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s ease, border-color 0.15s ease,
                        transform 0.1s ease;
        }

        .btn:hover {
            background: var(--color-accent-hover);
            border-color: var(--color-accent-hover);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== MESSAGES ===== */
        .message {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 4px;
            font-size: 0.875rem;
            line-height: 1.5;
            display: none;
            animation: fadeSlideIn 0.3s ease;
        }

        .message--error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: var(--color-error);
        }

        .message--success {
            background: #f0fdf0;
            border: 1px solid #bbf7b7;
            color: #15803d;
        }

        .message a {
            color: var(--color-accent);
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.15s ease;
            word-break: break-all;
        }

        .message a:hover {
            border-bottom-color: var(--color-accent);
        }

        .message .link-arrow {
            display: inline-block;
            margin-left: 4px;
            transition: transform 0.15s ease;
        }

        .message a:hover .link-arrow {
            transform: translateX(3px);
        }

        /* ===== FOOTER ===== */
        .footer-note {
            margin-top: 20px;
            text-align: center;
            font-size: 0.6875rem;
            color: #c4c4c4;
            letter-spacing: 0.03em;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== SHAKE ===== */
        .shake {
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 560px) {
            body {
                padding: 16px;
                align-items: flex-start;
                padding-top: 48px;
            }

            .card {
                padding: 24px 20px;
            }

            .form-group {
                flex-direction: column;
            }

            .btn {
                text-align: center;
                padding: 12px 22px;
            }

            .task-math {
                font-size: 0.8125rem;
                padding: 12px 14px;
            }
        }

        @media (max-width: 360px) {
            .card {
                padding: 20px 16px;
            }

            .task-description {
                font-size: 0.875rem;
            }
        }

        /* ===== PREFERS DARK (optional subtle support) ===== */
        @media (prefers-color-scheme: dark) {
            :root {
                --color-bg: #191919;
                --color-text: #e0e0e0;
                --color-text-secondary: #999999;
                --color-border: #333333;
                --color-border-hover: #555555;
                --color-input-bg: #222222;
                --color-card-bg: #1e1e1e;
            }

            .message--error {
                background: #2d1f1f;
                border-color: #5c2a2a;
                color: #f87171;
            }

            .message--success {
                background: #1a2e1a;
                border-color: #2d5a2d;
                color: #4ade80;
            }

            .message a {
                color: #4ade80;
            }

            .input-field:focus {
                background: var(--color-input-bg);
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Top bar -->
    <div class="top-bar">
        <div class="top-bar__icon">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="2" y="9" width="16" height="9" rx="1.5"/>
                <path d="M6 9V6a4 4 0 1 1 8 0v3"/>
            </svg>
        </div>
        <span class="top-bar__title">Доступ по паролю</span>
    </div>

    <!-- Card -->
    <div class="card">

        <div class="task-label">Задача</div>

        <p class="task-description">
            Чтобы получить ссылку, решите задачу:
        </p>

        <div class="task-math">
            Число увеличили на 20%, а&nbsp;потом уменьшили на&nbsp;25%.
            В&nbsp;итоге получилось&nbsp;96.<br>
            Найти первоначальное число.
        </div>

        <p class="task-hint">
            Ответ введите в поле ниже целым числом, без&nbsp;остатка
            (пример: <em>34</em>, <em>20</em>, <em>2</em>, <em>14</em>…)
        </p>

        <hr class="divider">

        <form id="passwordForm" autocomplete="off">
            <div class="form-group">
                <input
                    type="text"
                    id="passwordInput"
                    class="input-field"
                    placeholder="Ваш ответ…"
                    inputmode="numeric"
                    autofocus
                    required
                >
                <button type="submit" class="btn" id="submitBtn">
                    Проверить
                </button>
            </div>
        </form>

        <div id="message" class="message"></div>

    </div>

    <div class="footer-note">Одна попытка — один шаг ближе</div>

</div>

<script>
    const form = document.getElementById('passwordForm');
    const input = document.getElementById('passwordInput');
    const btn = document.getElementById('submitBtn');
    const messageEl = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const value = input.value.trim();
        if (!value) {
            input.focus();
            return;
        }

        btn.disabled = true;
        btn.textContent = '…';
        messageEl.style.display = 'none';

        try {
            const response = await fetch('/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: value })
            });

            const data = await response.json();

            if (data.success) {
                messageEl.className = 'message message--success';
                messageEl.innerHTML =
                    '✓ Верно! Вот ваша ссылка:<br>' +
                    '<a href="' + escapeHtml(data.link) + '" target="_blank" rel="noopener">' +
                    escapeHtml(data.link) +
                    ' <span class="link-arrow">→</span></a>';
                messageEl.style.display = 'block';
                input.disabled = true;
                btn.disabled = true;
                btn.textContent = 'Готово';
            } else {
                messageEl.className = 'message message--error';
                messageEl.textContent = data.message || 'Неверный ответ.';
                messageEl.style.display = 'block';

                // Shake
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 400);

                input.select();
                btn.disabled = false;
                btn.textContent = 'Проверить';
            }
        } catch (err) {
            messageEl.className = 'message message--error';
            messageEl.textContent = 'Ошибка соединения. Попробуйте позже.';
            messageEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Проверить';
        }
    });

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }
</script>

</body>
</html>
